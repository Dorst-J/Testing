<!DOCTYPE html> 
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>

  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding-top: 100px;
      margin: 0;
    }

    .loginBtnWrap {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-top: 20px;
      width: 100%;
    }

    .small {
      color: #666;
      font-size: 0.95rem;
      margin-top: 14px;
    }
  </style>
</head>
<body>

<h2>Sign in with Google to continue</h2>

<div id="g_id_onload"
  data-client_id="653779522470-ebl157omo84vrsc733eupggldqg1pugk.apps.googleusercontent.com"
  data-callback="handleCredentialResponse"
  data-auto_prompt="false"></div>

<div class="loginBtnWrap">
  <div class="g_id_signin"
    data-type="standard"
    data-size="large"
    data-theme="outline"
    data-text="sign_in_with"
    data-shape="rectangular"
    data-logo_alignment="left"></div>
</div>

<div class="small" id="msg"></div>

<script>
const apiBase = "https://api.thedatatab.com";

async function handleCredentialResponse(response) {
  const msg = document.getElementById("msg");
  msg.textContent = "Signing in...";

  try {
    const r = await fetch(`${apiBase}/signin`, {
      method: "POST",
      credentials: "include",
      headers: { "content-type": "application/json" },
      body: JSON.stringify({ credential: response.credential })
    });

    const j = await r.json();

    if (!j.success) {
      msg.textContent = "";
      alert(j.error || "Not authorized");
      return;
    }

    window.location.replace(j.defaultPage);
  } catch (e) {
    msg.textContent = "";
    alert("Sign-in failed: " + e.message);
  }
}
</script>
</body>
</html>
