<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>

  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding-top: 100px;
      margin: 0;
    }

    .small {
      color: #666;
      font-size: 0.95rem;
      margin-top: 14px;
    }
  </style>
</head>
<body>

<h2>Sign in with Google to continue</h2>

<div id="g_id_onload"
  data-client_id="653779522470-ebl157omo84vrsc733eupggldqg1pugk.apps.googleusercontent.com"
  data-callback="handleCredentialResponse"
  data-auto_prompt="false"></div>

<div class="g_id_signin"
  data-type="standard"
  data-size="large"
  data-theme="outline"
  data-text="sign_in_with"
  data-shape="rectangular"
  data-logo_alignment="left"></div>

<div class="small" id="msg"></div>

<script>
const USERS = {
  "sedorst17@gmail.com": {
    defaultPage: "./SimonsAdminDash.html",
    allow: ["*"],
    deny: ["./AdminMainPage.html"]
  },

  "gambling@arsports.org": {
    defaultPage: "./Dashboard.html",
    allow: ["*"],
    deny: ["./SimonsAdminDash.html"]
  },

  "jenna.dorst@gmail.com": {
    defaultPage: "./SimonsAdminDash.html",
    allow: ["*"],
    deny: []
  },

  "chanticlear.tabs@gmail.com": {
    defaultPage: "./ChanticlearSeller.html",
    allow: [
      "./ChanticlearSeller.html"
    ],
    deny: [
      "./SimonsAdminDash.html",
      "./Dashboard.html",
      "./McDuffsSeller.html",
      "./WilliesSeller.html",
      "./NorthwoodsSeller.html",
      "./Transportation.html",
      "./Pickup.html",
      "./Deposit.html",
      "./OfficeLocation.html",
      "./UploadDbf.html",
      "./LG844.html",
      "./LG846.html"
    ]
  }
};

const UNAUTHORIZED_REDIRECT = "";

function norm(p){
  if (!p) return "";
  return "/" + String(p).replace("./","").replace(/^\/+/,"");
}

function handleCredentialResponse(response) {
  const tokenData = parseJwt(response.credential);
  const email = (tokenData.email || "").toLowerCase().trim();
  const name = tokenData.name || email;

  const user = USERS[email];

  if (!user) {
    localStorage.clear();
    alert("You are not authorized to access this site.");
    if (UNAUTHORIZED_REDIRECT) window.location.href = UNAUTHORIZED_REDIRECT;
    return;
  }

  const defaultPage = norm(user.defaultPage);

  localStorage.setItem("userEmail", email);
  localStorage.setItem("userName", name);
  localStorage.setItem("defaultPage", defaultPage);
  localStorage.setItem("allowedPages", JSON.stringify(user.allow || []));
  localStorage.setItem("deniedPages", JSON.stringify(user.deny || []));
  localStorage.setItem("loginTime", String(Date.now()));

  window.location.replace(defaultPage);
}

function parseJwt(token) {
  const base64Url = token.split('.')[1];
  const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
  const jsonPayload = decodeURIComponent(
    atob(base64).split('').map(c =>
      '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)
    ).join('')
  );
  return JSON.parse(jsonPayload);
}

function canAccess(page) {
  const allow = JSON.parse(localStorage.getItem("allowedPages") || "[]");
  const deny = JSON.parse(localStorage.getItem("deniedPages") || "[]");

  const target = norm(page);
  const denied = deny.map(norm);
  const allowed = allow.map(norm);

  if (denied.includes(target)) return false;
  if (allow.includes("*")) return true;

  return allowed.includes(target);
}

window.go = function(page) {
  const email = localStorage.getItem("userEmail");
  const loginTime = Number(localStorage.getItem("loginTime") || 0);
  const maxAge = 1000 * 60 * 60 * 12;

  if (!email || !loginTime || Date.now() - loginTime > maxAge) {
    localStorage.clear();
    alert("Please sign in first.");
    window.location.replace("/index.html");
    return;
  }

  if (!canAccess(page)) {
    alert("You are not allowed to view that page.");
    return;
  }

  window.location.href = norm(page);
};
</script>
</body>
</html>
