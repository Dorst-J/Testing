<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>LG844</title>
  <style>
    body{font-family:Arial;margin:0;color:#111}
    header{display:flex;justify-content:space-between;align-items:center;padding:16px;border-bottom:1px solid #ddd}
    .smallBtn{padding:8px 12px;border-radius:10px;border:1px solid #bbb;background:#fff;cursor:pointer}
    select{padding:9px 12px;border-radius:10px;border:1px solid #bbb;font-size:15px}
    .wrap{padding:18px}
    .muted{color:#666;font-size:13px;margin-top:8px}

    .printPage{
      width:8.5in;
      min-height:10.75in;
      margin:0 auto 24px;
      box-sizing:border-box;
      padding:18px;
      page-break-after:always;
      break-after:page;
    }

    .printPage:last-child{
      page-break-after:auto;
      break-after:auto;
    }

    h2{
      text-align:center;
      margin:0 0 8px;
      font-size:22px;
      line-height:1.15;
    }

    .line{
      display:flex;
      justify-content:space-between;
      gap:18px;
      margin:10px 0 18px;
      font-size:15px;
    }

    .sectionTitle{
      font-weight:bold;
      margin:20px 0 8px;
      font-size:20px;
    }

    table{
      width:100%;
      border-collapse:collapse;
      font-size:10px;
      table-layout:fixed;
    }

    th,td{
      border:1px solid #333;
      padding:4px;
      vertical-align:middle;
      text-align:center;
      word-break:break-word;
    }

    th{
      background:#f1f1f1;
      font-weight:700;
    }

    @page{
      size:letter;
      margin:0.25in;
    }

    @media print{
      header,.screenOnly{display:none}

      html,body{
        margin:0;
        padding:0;
      }

      .wrap{
        padding:0;
      }

      .printPage{
        width:100%;
        min-height:10.75in;
        margin:0;
        padding:0;
        page-break-after:always;
        break-after:page;
      }

      .printPage:last-child{
        page-break-after:auto;
        break-after:auto;
      }

      table{
        font-size:9px;
      }

      th,td{
        padding:3px;
      }
    }
  </style>
</head>
<body>
  <header>
    <button class="smallBtn" onclick="location.href='/Dashboard.html'">Return Home</button>

    <div>
      <label for="barSelect"><b>Bar Location:</b></label>
      <select id="barSelect">
        <option value="">Choose location...</option>
        <option value="Chanticlear">Chanticlear</option>
        <option value="McDuffs">McDuffs</option>
        <option value="Willies">Willies</option>
        <option value="Northwoods">Northwoods</option>
      </select>
    </div>

    <button class="smallBtn" onclick="window.print()">Print Page</button>
  </header>

  <div class="wrap">
    <div id="status" class="muted screenOnly">Choose a bar location to load inventory.</div>
    <div id="pages"></div>
  </div>

<script>
const apiBase = "https://overview.jenna-dorst.workers.dev";
let currentSite = "";

const ROWS_PER_PAGE = 32;

async function api(path){
  const resp = await fetch(`${apiBase}${path}`);
  const txt = await resp.text();
  try { return JSON.parse(txt); }
  catch { return { ok:false, error: txt || `HTTP ${resp.status}` }; }
}

function money(v){
  if(v === "" || v === null || v === undefined) return "";
  const n = Number(v);
  return Number.isFinite(n) ? `$${n.toFixed(2)}` : v;
}

function classify(rows){
  const pulltabs = [];
  const tipboards = [];
  const paddletickets = [];

  for(const r of rows){
    const p = String(r.partNumber || "").toUpperCase();

    if(p.includes("PT1")){
      paddletickets.push(r);
    } else if(p.includes("XB100") || p.includes("TIP")){
      tipboards.push(r);
    } else {
      pulltabs.push(r);
    }
  }

  return { pulltabs, tipboards, paddletickets };
}

function chunkRows(rows){
  const chunks = [];
  if(!rows.length) return [[]];

  for(let i = 0; i < rows.length; i += ROWS_PER_PAGE){
    chunks.push(rows.slice(i, i + ROWS_PER_PAGE));
  }
  return chunks;
}

function makeTable(rows){
  return `
    <table>
      <colgroup>
        <col style="width:8%">
        <col style="width:10%">
        <col style="width:9%">
        <col style="width:9%">
        <col style="width:12%">
        <col style="width:16%">
        <col style="width:10%">
        <col style="width:9%">
        <col style="width:8%">
        <col style="width:9%">
      </colgroup>
      <thead>
        <tr>
          <th>Invoice Date</th>
          <th>Distributor Name</th>
          <th>Invoice Number</th>
          <th>Manufacture ID</th>
          <th>Part Number</th>
          <th>Game Name</th>
          <th>Game Serial Number</th>
          <th>Actual Game Cost</th>
          <th>Date Put into Play</th>
          <th>Date Game Closed</th>
        </tr>
      </thead>
      <tbody>
        ${rows.length ? rows.map(r => `
          <tr>
            <td>${r.invoiceDate || ""}</td>
            <td>${r.distributorName || ""}</td>
            <td>${r.invoiceNumber || ""}</td>
            <td>${r.manufactureId || ""}</td>
            <td>${r.partNumber || ""}</td>
            <td>${r.gameName || ""}</td>
            <td>${r.gameSerialNumber || ""}</td>
            <td>${money(r.actualGameCost)}</td>
            <td>${r.datePutIntoPlay || ""}</td>
            <td>${r.dateGameClosed || ""}</td>
          </tr>
        `).join("") : `
          <tr><td colspan="10">(No records)</td></tr>
        `}
      </tbody>
    </table>
  `;
}

function makeHeader(){
  return `
    <h2>LG844 Perpetual Inventory/Paper Pull-Tabs, Tipboards, and/or<br>Paddletickets</h2>

    <div class="line">
      <div>Organization Name: Anoka Ramsey Athletic Association (ARAA)</div>
      <div>License/Premises Permit Number: 98049</div>
    </div>
  `;
}

function makePage(sectionTitle, pageRows, pageNum, totalPages){
  const continued = totalPages > 1 && pageNum > 1 ? " (continued)" : "";

  return `
    <section class="printPage">
      ${makeHeader()}
      <div class="sectionTitle">${sectionTitle}${continued}</div>
      ${makeTable(pageRows)}
    </section>
  `;
}

function renderSection(title, rows){
  const chunks = chunkRows(rows);
  return chunks.map((chunk, idx) =>
    makePage(title, chunk, idx + 1, chunks.length)
  ).join("");
}

function renderPages(grouped){
  document.getElementById("pages").innerHTML =
    renderSection("Paper Pull-Tabs", grouped.pulltabs || []) +
    renderSection("Tipboard Games", grouped.tipboards || []) +
    renderSection("Paddletickets", grouped.paddletickets || []);
}

function renderEmpty(){
  renderPages({ pulltabs:[], tipboards:[], paddletickets:[] });
}

document.getElementById("barSelect").addEventListener("change", async e => {
  const loc = e.target.value;
  currentSite = loc || "";

  if(!loc){
    document.getElementById("status").textContent = "Choose a bar location to load inventory.";
    renderEmpty();
    return;
  }

  document.getElementById("status").textContent = "Loading...";

  const r = await api(`/api/lg844/${encodeURIComponent(loc)}`);

  if(!r.ok){
    document.getElementById("status").textContent = `Error: ${r.error}`;
    renderEmpty();
    return;
  }

  const grouped = classify(r.rows || []);
  renderPages(grouped);

  document.getElementById("status").textContent =
    `${loc} loaded — Pull-Tabs: ${grouped.pulltabs.length}, Tipboards: ${grouped.tipboards.length}, Paddletickets: ${grouped.paddletickets.length}`;
});

renderEmpty();
</script>
</body>
</html>
