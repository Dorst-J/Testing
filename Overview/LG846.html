<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>LG846</title>
  <style>
    body{font-family:Arial;margin:0;color:#111}
    header{display:flex;justify-content:space-between;align-items:center;padding:16px;border-bottom:1px solid #ddd}
    .smallBtn{padding:8px 12px;border-radius:10px;border:1px solid #bbb;background:#fff;cursor:pointer}
    select{padding:9px 12px;border-radius:10px;border:1px solid #bbb;font-size:15px}
    .wrap{padding:18px}
    .muted{color:#666;font-size:13px;margin-top:8px}

    .printPage{
  width:8.5in;
  height:10.35in;
  margin:0 auto 24px;
  position:relative;
  box-sizing:border-box;
  padding:18px 18px 125px 18px;
  page-break-after:always;
  break-after:page;
  overflow:hidden;
}

    .printPage:last-child{
      page-break-after:auto;
      break-after:auto;
    }

    h2{text-align:center;margin:0 0 8px;font-size:18px}
    .line{margin:8px 0;font-size:15px}
    .sectionTitle{font-weight:bold;margin:20px 0 8px;font-size:20px}

    table{
  width:100%;
  border-collapse:collapse;
  font-size:10px;
  table-layout:fixed;
}

th,td{
  border:1px solid #333;
  padding:4px;
  vertical-align:middle;
  text-align:center;
}

th{
  background:#f1f1f1;
  font-weight:700;
}

td.money{
  text-align:center;
}

  .footerBox{
  position:absolute;
  left:18px;
  right:18px;
  bottom:18px;
  height:105px;
  border:2px solid #111;
  display:grid;
  grid-template-columns:1fr 130px;
  background:#fff;
  box-sizing:border-box;
}

.sigBox{
  padding:8px;
  border-right:2px solid #111;
  display:grid;
  grid-template-rows:auto 1fr auto;
  box-sizing:border-box;
}

.sigText{
  font-size:13px;
  line-height:1.2;
}

.sigLine{
  border-bottom:1px solid #111;
  align-self:end;
  margin-bottom:8px;
}

.dateRow{
  display:flex;
  justify-content:flex-start;
  align-items:center;
  gap:12px;
  font-size:13px;
}

.dateBlank{
  border-bottom:1px solid #111;
  min-width:180px;
  text-align:center;
  height:16px;
  line-height:16px;
}

.totalBox{
  height:100%;
  display:grid;
  grid-template-rows:34px 1fr;
}

.totalTop{
  display:flex;
  align-items:center;
  justify-content:space-between;
  border-bottom:2px solid #111;
  padding:0 8px;
  font-size:13px;
  font-weight:bold;
}

.totalAmount{
  font-weight:normal;
}

.sigLine{
  margin-top:26px;
  border-bottom:1px solid #111;
  height:0;
}

.dateLine{
  display:flex;
  justify-content:flex-end;
  align-items:center;
  gap:8px;
  margin-top:8px;
  font-size:13px;
}

.dateBlank{
  border-bottom:1px solid #111;
  min-width:180px;
  text-align:center;
  line-height:16px;
  height:16px;
}

   @page{
  size:letter;
  margin:0.25in;
}

@media print{
  header,.screenOnly{display:none}

  html,body{
    margin:0;
    padding:0;
  }

  .wrap{
    padding:0;
  }

  .printPage{
    width:100%;
    height:10.35in;
    margin:0;
    padding:0 0 125px 0;
    page-break-after:always;
    break-after:page;
    overflow:hidden;
  }

  .printPage:last-child{
    page-break-after:auto;
    break-after:auto;
  }

  .footerBox{
  left:0;
  right:0;
  bottom:0;
  height:105px;
}

  table{
    font-size:9px;
  }

  th,td{
    padding:3px;
    text-align:center;
  }
}
  </style>
</head>
<body>
  <header>
    <button class="smallBtn" onclick="location.href='/Dashboard.html'">Return Home</button>

    <div>
      <label for="barSelect"><b>Bar Location:</b></label>
      <select id="barSelect">
        <option value="">Choose location...</option>
        <option value="Chanticlear">Chanticlear</option>
        <option value="McDuffs">McDuffs</option>
        <option value="Willies">Willys</option>
        <option value="Northwoods">Northwoods</option>
      </select>
    </div>

    <button class="smallBtn" onclick="window.print()">Print Page</button>
  </header>

  <div class="wrap">
    <div id="status" class="muted screenOnly">Choose a bar location to load inventory.</div>
    <div id="pages"></div>
  </div>

<script>
const apiBase = "https://overview.jenna-dorst.workers.dev";
let currentSite = "";

const ROWS_PER_PAGE = 29;

function today(){
  const d = new Date();
  const mm = String(d.getMonth()+1).padStart(2,"0");
  const dd = String(d.getDate()).padStart(2,"0");
  const yy = d.getFullYear();
  return `${mm}/${dd}/${yy}`;
}

function monthYear(){
  const d = new Date();
  return d.toLocaleString("en-US", { month:"long", year:"numeric" });
}

async function api(path){
  const resp = await fetch(`${apiBase}${path}`);
  const txt = await resp.text();
  try { return JSON.parse(txt); }
  catch { return { ok:false, error: txt || `HTTP ${resp.status}` }; }
}

function money(v){
  if(v === "" || v === null || v === undefined) return "";
  const n = Number(v);
  return Number.isFinite(n) ? `$${n.toFixed(2)}` : v;
}

function sumCost(rows){
  return rows.reduce((sum, r) => {
    const n = Number(r.actualGameCost);
    return sum + (Number.isFinite(n) ? n : 0);
  }, 0);
}

function chunkRows(rows){
  const chunks = [];
  if(!rows.length) return [[]];

  for(let i = 0; i < rows.length; i += ROWS_PER_PAGE){
    chunks.push(rows.slice(i, i + ROWS_PER_PAGE));
  }
  return chunks;
}

function makeTable(rows){
  return `
    <table>
      <thead>
        <tr>
          <th>Manufacture ID</th>
          <th>Part Number</th>
          <th>Game Name</th>
          <th>Game Serial Number</th>
          <th>Actual Game Cost</th>
        </tr>
      </thead>
      <tbody>
        ${rows.length ? rows.map(r => `
          <tr>
            <td>${r.manufactureId || ""}</td>
            <td>${r.partNumber || ""}</td>
            <td>${r.gameName || ""}</td>
            <td>${r.gameSerialNumber || ""}</td>
            <td class="money">${money(r.actualGameCost)}</td>
          </tr>
        `).join("") : `
          <tr><td colspan="5" style="text-align:center;">No records</td></tr>
        `}
      </tbody>
    </table>
  `;
}

function makeFooter(totalRows){
  return `
    <div class="footerBox">
      <div class="sigBox">
        <div class="sigText">
          <b>Signature of person verifying physical inventory</b>
          (may not be the person who maintains the perpetual inventory):
        </div>

        <div class="sigLine"></div>

        <div class="dateRow">
          <span>Date Taken:</span>
          <span class="dateBlank">${today()}</span>
        </div>
      </div>

      <div class="totalBox">
        <div class="totalTop">
          <span>TOTAL:</span>
          <span class="totalAmount">${money(sumCost(totalRows))}</span>
        </div>
        <div></div>
      </div>
    </div>
  `;
}

function makePage(sectionTitle, pageRows, allSectionRows, pageNum, totalPages){
  const continued = totalPages > 1 && pageNum > 1 ? " (continued)" : "";

  return `
    <section class="printPage">
      <h2>LG846 Physical Inventory / Pull-Tabs, Tipboards, and / or Paddletickets Monthly Report</h2>

      <div class="line">
        Organization Name: Anoka Ramsey Athletic Association (ARAA)
        &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
        License/Premises Permit Number: 98049
      </div>

      <div class="line">
        Site Name: ${currentSite || ""}
        &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
        Month/Year: ${monthYear()}
      </div>

      <div class="sectionTitle">${sectionTitle}${continued}</div>
      ${makeTable(pageRows)}
      ${makeFooter(allSectionRows)}
    </section>
  `;
}

function renderSection(title, rows){
  const chunks = chunkRows(rows);
  return chunks.map((chunk, idx) =>
    makePage(title, chunk, rows, idx + 1, chunks.length)
  ).join("");
}

function classify(rows){
  const pulltabs = [];
  const tipboards = [];
  const paddletickets = [];

  for(const r of rows){
    const p = String(r.partNumber || "").toUpperCase();

    if(p.includes("PT1")){
      paddletickets.push(r);
    } else if(p.includes("XB100") || p.includes("TIP")){
      tipboards.push(r);
    } else {
      pulltabs.push(r);
    }
  }

  return { pulltabs, tipboards, paddletickets };
}

function renderPages(grouped){
  document.getElementById("pages").innerHTML =
    renderSection("Paper Pull-Tabs", grouped.pulltabs || []) +
    renderSection("Tipboard Games", grouped.tipboards || []) +
    renderSection("Paddletickets", grouped.paddletickets || []);
}

function renderEmpty(){
  renderPages({ pulltabs:[], tipboards:[], paddletickets:[] });
}

document.getElementById("barSelect").addEventListener("change", async e => {
  const loc = e.target.value;
  currentSite = loc || "";

  if(!loc){
    document.getElementById("status").textContent = "Choose a bar location to load inventory.";
    renderEmpty();
    return;
  }

  document.getElementById("status").textContent = "Loading...";

  const r = await api(`/api/lg846/${encodeURIComponent(loc)}`);

  if(!r.ok){
    document.getElementById("status").textContent = `Error: ${r.error}`;
    renderEmpty();
    return;
  }

  const grouped = classify(r.rows || []);
  renderPages(grouped);

  document.getElementById("status").textContent =
    `${loc} loaded — Pull-Tabs: ${grouped.pulltabs.length}, Tipboards: ${grouped.tipboards.length}, Paddletickets: ${grouped.paddletickets.length}`;
});

renderEmpty();
</script>
</body>
</html>
